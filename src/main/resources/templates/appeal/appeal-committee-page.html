<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

</head>
<div th:replace="common/fragments/error-popup"></div>
<div th:replace="common/fragments/header"></div>
<body>
<main class="app-main">

    <!-- Три формы в строку: поиск / удаление / обновление -->
    <section class="card-row">

        <!-- поиск -->
        <div class="card card-sm">
            <h3 class="card-title">
                <i class="bi bi-search"></i>
                Знайти абітурієнта
            </h3>
            <div th:replace="applicants/fragments/find-applicant"></div>
        </div>

        <!-- удаление -->
        <div class="card card-sm">
            <h3 class="card-title">
                <i class="bi bi-trash"></i>
                Видалити абітурієнта
            </h3>
            <div th:replace="applicants/fragments/delete-applicant"></div>
        </div>

        <!-- обновление статуса -->
        <div class="card card-sm">
            <h3 class="card-title">
                <i class="bi bi-arrow-repeat"></i>
                Оновити статус
            </h3>
            <div th:replace="applicants/fragments/update-applicant-status"></div>
        </div>

    </section>


    <!-- Таблица + селектор специальности -->
    <section class="card">
        <div class="card-header-inline">
            <h2 class="card-title">
                <i class="bi bi-table"></i>
                Таблиця абітурієнтів
            </h2>

            <div th:replace="applicants/fragments/select-by-quota-and-specialty"></div>
        </div>

        <div th:replace="applicants/fragments/table"></div>
    </section>
</main>
</body>
</html>
