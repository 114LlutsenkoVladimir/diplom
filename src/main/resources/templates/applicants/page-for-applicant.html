<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:replace="common/fragments/error-popup"></div>
<div th:replace="common/fragments/header"></div>

<main class="app-main">

    <section class="card-row">
        <!-- поиск -->
        <div class="card card-sm">
            <h3 class="card-title">
                <i class="bi bi-search"></i>
                Переглянути свої заяви
            </h3>
            <div th:replace="applicants/fragments/find-own-applications"></div>
        </div>

        <div class="card card-sm">
            <h3 class="card-title">
                <i class="bi bi-trash"></i>
                Видалити заяву
            </h3>
            <div th:replace="applicants/fragments/delete-application"></div>
        </div>

        <div class="card card-sm">
            <h3 class="card-title">
                <i class="bi bi-shield-exclamation"></i>
                Подати апеляцію
            </h3>
            <div th:replace="appeal/fragments/add-appeal"></div>
        </div>

    </section>

    <!-- Таблиця -->
    <section class="card">
        <div class="card-header-inline">
            <h2 class="card-title">
                <i class="bi bi-table"></i>
                Таблиця абітурієнтів
            </h2>

            <div th:replace="applicants/fragments/select-by-quota-and-specialty"></div>
        </div>
        <div th:replace="applicants/fragments/table"></div>
    </section>
</main>



<script type="module" src="/js/applicant/app.js"></script>
    <script type="module" src="/js/errorPopup/errorPopup.js"></script>
    <script type="module" src="/js/applicant/filterTable.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/error-popup-style.css}">
</body>
</html>
